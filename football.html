  <style>
    /* ── RESET ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── THEME VARIABLES (defaults = Husom Electronics) ── */
    :root {
      --shell-light: #f5ecd8;
      --shell-mid:   #d8c8a4;
      --shell-dark:  #b89e70;
      --btn-top:     #e42222;
      --btn-bot:     #920c0c;
      --btn-shadow:  #5e0000;
      --btn-hl:      rgba(255,130,130,0.3);
      --brand-co:    #7a6238;
      --brand-title: #b81200;
      --tagline:     #6a5230;
    }

    /* ── PAGE ── */
    html, body {
      min-height: 100vh;
      background:
        linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.55)),
        url('./football_stiff.png') center center / cover no-repeat fixed;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 16px 48px;
      font-family: 'Inter', system-ui, sans-serif;
      user-select: none;
    }

    /* ── BACK LINK ── */
    .nav-back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: #5a4a28;
      text-decoration: none;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 28px;
      transition: color 0.2s;
    }
    .nav-back:hover { color: #9a8450; }

    /* ── CONSOLE SHELL ── */
    .console {
      width: min(620px, 100%);
      background:
        linear-gradient(170deg,
          var(--shell-light) 0%,
          var(--shell-mid)   50%,
          var(--shell-dark)  100%);
      border-radius: 24px 24px 36px 36px;
      padding: 22px 24px 30px;
      position: relative;
      box-shadow:
        0 40px 100px rgba(0,0,0,0.85),
        0 16px 40px rgba(0,0,0,0.6),
        inset 0 2px 0 rgba(255,255,255,0.6),
        inset 0 -5px 10px rgba(0,0,0,0.3),
        inset 3px 0 4px rgba(255,255,255,0.2),
        inset -3px 0 4px rgba(0,0,0,0.1);
      transition: background 0.45s;
    }

    /* Outer rim highlight */
    .console::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 24px 24px 36px 36px;
      border: 1.5px solid rgba(255,255,255,0.35);
      pointer-events: none;
    }

    /* Subtle mold-line crease at bottom third */
    .console::after {
      content: '';
      position: absolute;
      left: 0; right: 0;
      bottom: 88px;
      height: 1px;
      background: linear-gradient(90deg,
        transparent 0%,
        rgba(0,0,0,0.12) 15%,
        rgba(0,0,0,0.18) 50%,
        rgba(0,0,0,0.12) 85%,
        transparent 100%);
      pointer-events: none;
    }

    /* ── BRAND BAR ── */
    .brand-bar {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 0 6px 12px;
      margin-bottom: 12px;
      border-bottom: 1px solid rgba(120,90,40,0.2);
    }

    .brand-company {
      font-size: 0.54rem;
      font-weight: 800;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--brand-co);
      font-style: italic;
      transition: color 0.4s;
    }

    .brand-title {
      font-size: 1.05rem;
      font-weight: 900;
      letter-spacing: 0.38em;
      text-transform: uppercase;
      color: var(--brand-title);
      text-shadow:
        0 1px 0 rgba(255,255,255,0.35),
        0 -1px 0 rgba(0,0,0,0.2);
      transition: color 0.4s;

    /* ── DISPLAY SECTION ── */
    .display-section {
      display: flex;
      gap: 12px;
      align-items: stretch;
      margin-bottom: 20px;
    }

    /* Stat columns flanking the field */
    .stat-col {
      display: flex;
      flex-direction: column;
      gap: 8px;

      flex-shrink: 0;
    }

    .stat-box {
      background: #050302;
      border-radius: 7px;
      padding: 7px 9px;

    /* ── LED BEZEL ── */
    .led-bezel {
      flex: 1;
      background: #060401;
      border-radius: 10px;
      padding: 14px 16px;
      position: relative;
      overflow: hidden;
      box-shadow:
        inset 0 5px 18px rgba(0,0,0,0.98),
        inset 0 2px 5px rgba(0,0,0,0.9),
        inset 0 0 0 2px #020100,
        0 2px 0 rgba(255,255,255,0.1);
    }

    /* Lens tint — warm dark amber overlay */
    .led-bezel::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 40%,
        rgba(80,30,0,0.08) 0%,
        rgba(20,8,0,0.22) 100%);
      pointer-events: none;
      z-index: 2;
      border-radius: 10px;
    }

    /* Subtle scanline grid */
    .led-bezel::after {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 3px,
        rgba(0,0,0,0.06) 3px,
        rgba(0,0,0,0.06) 4px
      );
      pointer-events: none;
      z-index: 3;
      border-radius: 10px;
    }

    #led-canvas {
      display: block;
      position: relative;
      z-index: 1;
      max-width: 100%;
      height: auto;
    }

    /* Field label */
    .field-label {
      position: absolute;
      bottom: 5px;
      left: 0; right: 0;

  <script>
  // =================================================================
  //  LED FIELD DISPLAY + GAME INPUT
  // =================================================================

  (function () {
    var canvas = document.getElementById('led-canvas');
    var ctx    = canvas.getContext('2d');

    // ── GRID CONFIG ──
    var COLS   = 10;   // field columns (left end → right end zone)
    var ROWS   = 7;    // field rows (top to bottom)
    var CW     = 32;   // cell width  (LED dash width)
    var CH     = 13;   // cell height (LED dash height)
    var GX     = 5;    // horizontal gap between cells
    var GY     = 7;    // vertical gap between cells

    canvas.width  = COLS * (CW + GX) - GX;   // 365px
    canvas.height = ROWS * (CH + GY) - GY;   // 133px

    // ── COLORS ──
    var COL_BG      = '#060401';
    var COL_UNLIT   = '#1e0b02';   // barely-there dark brown — unlit LED
    var COL_DEF     = '#ff3e00';   // defenders — orange-red
    var COL_OFF     = '#ffb040';   // offense — brighter amber-orange (ball carrier)
    var COL_OFF_TOP = '#ffe080';   // inner bright highlight on offense dash

    // ── FIELD STATE ──
    // null = empty  'O' = offense (you)  'D' = defense
    var cells = [];
    for (var r = 0; r < ROWS; r++) {
      cells[r] = [];
      for (var c = 0; c < COLS; c++) { cells[r][c] = null; }
    }

    // Offense position tracking
    var offRow = 3, offCol = 3;
    cells[offRow][offCol] = 'O';

    // Defense — 5 defenders in a spread formation ahead of offense
    cells[1][6] = 'D';
    cells[2][5] = 'D';
    cells[3][7] = 'D';
    cells[4][5] = 'D';
    cells[5][6] = 'D';

    // ── HELPERS ──
    function cx(col) { return col * (CW + GX); }
    function cy(row) { return row * (CH + GY); }

    // Draw a single LED cell
    function drawCell(col, row, type) {
      var x  = cx(col);
      var y  = cy(row);
      var rx = CH / 2;   // corner radius = half height → perfect pill shape

      ctx.save();

      if (!type) {
        // ── Unlit LED: just a dim pill ──
        ctx.fillStyle = COL_UNLIT;
        ctx.beginPath();
        ctx.roundRect(x, y, CW, CH, rx);
        ctx.fill();

      } else if (type === 'O') {
        // ── Offense: two stacked mini-dashes ("=" shape) with bright glow ──
        var dashH = Math.floor((CH - 3) / 2);
        var dashW = CW - 6;

        // Outer glow layer
        ctx.shadowColor = '#ff5000';
        ctx.shadowBlur  = 20;
        ctx.fillStyle   = '#ff6020';
        ctx.beginPath();
        ctx.roundRect(x - 2, y - 2, CW + 4, CH + 4, rx + 2);
        ctx.fill();

        // Top dash
        ctx.shadowBlur = 12;
        ctx.fillStyle  = COL_OFF;
        ctx.beginPath();
        ctx.roundRect(x + 3, y + 1, dashW, dashH, dashH / 2);
        ctx.fill();

        // Bottom dash
        ctx.beginPath();
        ctx.roundRect(x + 3, y + CH - dashH - 1, dashW, dashH, dashH / 2);
        ctx.fill();

        // Inner bright highlight (top dash)
        ctx.shadowBlur = 4;
        ctx.fillStyle  = COL_OFF_TOP;
        ctx.beginPath();
        ctx.roundRect(x + 6, y + 2, dashW - 6, dashH - 2, 1);
        ctx.fill();

      } else if (type === 'D') {
        // ── Defense: single centered dash ──
        var defY = y + Math.floor((CH - 5) / 2);

        // Outer glow
        ctx.shadowColor = '#cc2800';
        ctx.shadowBlur  = 14;
        ctx.fillStyle   = '#cc2800';
        ctx.beginPath();
        ctx.roundRect(x, y, CW, CH, rx);
        ctx.fill();

        // Core dash
        ctx.shadowBlur = 6;
        ctx.fillStyle  = COL_DEF;
        ctx.beginPath();
        ctx.roundRect(x + 2, defY, CW - 4, 5, 2);
        ctx.fill();

        // Inner highlight
        ctx.shadowBlur = 0;
        ctx.fillStyle  = '#ff7040';
        ctx.beginPath();
        ctx.roundRect(x + 5, defY + 1, CW - 14, 2, 1);
        ctx.fill();
      }

      ctx.restore();
    }

    // Draw subtle yard-line markers between columns
    function drawYardMarkers() {
      for (var c = 1; c < COLS; c++) {
        if (c % 2 === 0) continue;
        var x = cx(c) - Math.ceil(GX / 2);
        ctx.save();
        ctx.fillStyle = '#150800';
        ctx.fillRect(x, 2, 1, canvas.height - 4);
        ctx.restore();
      }
    }

    // ── MAIN RENDER ──
    function render() {
      ctx.fillStyle = COL_BG;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      drawYardMarkers();

      for (var r = 0; r < ROWS; r++) {
        for (var c = 0; c < COLS; c++) {
          drawCell(c, r, cells[r][c]);
        }
      }

      // End-zone shimmer
      ctx.save();
      ctx.fillStyle = 'rgba(255,80,0,0.03)';
      ctx.fillRect(cx(COLS - 1) - GX, 0, CW + GX + 4, canvas.height);
      ctx.restore();
    }

    render();

    // ── KEYBOARD MOVEMENT ──
    document.addEventListener('keydown', function (e) {
      var nr = offRow, nc = offCol;

      if      (e.key === 'ArrowUp')    nr--;
      else if (e.key === 'ArrowDown')  nr++;
      else if (e.key === 'ArrowRight') nc++;
      else if (e.key === 'ArrowLeft')  nc--;
      else return;

      // Prevent page scroll on arrow keys
      e.preventDefault();

      // Bounds check
      if (nr < 0 || nr >= ROWS || nc < 0 || nc >= COLS) return;

      // Move player
      cells[offRow][offCol] = null;
      offRow = nr;
      offCol = nc;
      cells[offRow][offCol] = 'O';

      render();
    });

  })();


  // =================================================================
  //  TEAM COLOR THEMES
  // =================================================================

  var TEAMS = {
    husom:       { name:'Pheasants', sub:'Default',

  var TEAM_ORDER = ['husom','westcoast','motortown','steelcurtain','purplepeeps',
                    'windycity','broadwayjoes','gmen','theboys','thepack','malosos'];

  var currentTheme = 'husom';

  // ── Darken a hex color by a fraction (0–1) ──
  function darkenHex(hex, pct) {
    var h = hex.replace('#','');
    if (h.length === 3) h = h[0]+h[0]+h[1]+h[1]+h[2]+h[2];
    var r = Math.max(0, Math.floor(parseInt(h.slice(0,2),16) * (1-pct)));
    var g = Math.max(0, Math.floor(parseInt(h.slice(2,4),16) * (1-pct)));
    var b = Math.max(0, Math.floor(parseInt(h.slice(4,6),16) * (1-pct)));
    return '#' + r.toString(16).padStart(2,'0')
               + g.toString(16).padStart(2,'0')
               + b.toString(16).padStart(2,'0');
  }

  // ── Apply theme to console ──
  function applyTheme(key) {
    var t = TEAMS[key];
    if (!t) return;
    currentTheme = key;
    var r = document.documentElement;
    r.style.setProperty('--shell-light',  t.shellLight);
    r.style.setProperty('--shell-mid',    t.shellMid);
    r.style.setProperty('--shell-dark',   t.shellDark);
    r.style.setProperty('--btn-top',      t.btnTop);
    r.style.setProperty('--btn-bot',      t.btnBot);
    r.style.setProperty('--btn-shadow',   t.btnShadow);
    r.style.setProperty('--btn-hl',       t.btnHL);
    r.style.setProperty('--brand-co',     t.brandCo);
    r.style.setProperty('--brand-title',  t.brandTitle);
    r.style.setProperty('--tagline',      t.tagline);
    // Update brand company text
    var bc = document.getElementById('brand-company');
    if (bc) bc.textContent = t.name;
    // Update active item highlight
    document.querySelectorAll('.team-item').forEach(function(item) {
      item.classList.toggle('active', item.dataset.key === key);
    });
  }

  // ── Build team picker grid ──
  function buildTeamSelect() {
    var grid = document.getElementById('team-grid');
    TEAM_ORDER.forEach(function(key) {
      var t = TEAMS[key];

      var item = document.createElement('div');
      item.className   = 'team-item' + (key === currentTheme ? ' active' : '');
      item.dataset.key = key;

      var btn = document.createElement('button');
      btn.className = 'helmet-btn';

      btn.style.setProperty('--hbg1',  t.shellLight);
      btn.style.setProperty('--hbg2',  t.shellMid);
      btn.style.setProperty('--hshad', t.shellDark);
      btn.style.setProperty('--hshad2', darkenHex(t.shellDark, 0.35));

      var img = document.createElement('img');
      img.src       = (t.helmSrc || 'svg_helmet.svg') + '?v=20260329b';
      img.alt       = t.name;
      img.draggable = false;
      if (t.helmFilter) img.style.filter = t.helmFilter;
      if (t.helmBlend)  img.style.mixBlendMode = t.helmBlend;

      var label = document.createElement('div');
      label.className   = 'team-btn-name';
      label.textContent = t.name;

      btn.appendChild(img);
      item.addEventListener('click', function() { applyTheme(key); });
      item.appendChild(btn);
      item.appendChild(label);
      grid.appendChild(item);
    });
  }

  buildTeamSelect();
