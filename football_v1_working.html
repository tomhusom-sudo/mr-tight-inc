<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>HonestTom | Stadium View</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
  <script>
    var VER = 'v=FinalClean-Video';
    if (location.search.indexOf(VER) === -1) {
      location.replace(location.pathname + '?' + VER);
    }
  </script>
  <style>
    /* ── BASE ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    
    html, body {
      height: 100vh;
      background: #000;
      display: flex; flex-direction: column; align-items: center; justify-content: space-evenly;
      padding: 20px; font-family: 'Inter', sans-serif; user-select: none;
      overflow: hidden;
    }

    /* ── REALISTIC AERIAL STADIUM ── */
    .stadium-aerial {
      width: min(1200px, 95vw);
      height: min(550px, 60vh);
      background: #1a1a1a; 
      border-radius: 300px;
      position: relative;
      box-shadow: 0 40px 100px rgba(0,0,0,0.8), inset 0 0 100px rgba(0,0,0,0.5);
      border: 12px solid #333;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }

    .field-markings {
      position: absolute; inset: 0;
      background: 
        repeating-linear-gradient(90deg, transparent, transparent 9.8%, rgba(255,255,255,0.1) 9.8%, rgba(255,255,255,0.1) 10%),
        linear-gradient(rgba(0,0,0,0.2) 0%, transparent 20%, transparent 80%, rgba(0,0,0,0.2) 100%);
      pointer-events: none;
    }

    .video-core {
      width: 70%; height: 75%;
      background: rgba(0,0,0,0.9);
      border-radius: 40px;
      box-shadow: 0 0 60px rgba(0,0,0,1);
      display: flex; align-items: center; justify-content: center;
      border: 4px solid #444;
      z-index: 10;
      overflow: hidden;
      position: relative;
    }

    #stadium-video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
    }

    /* ── SQUISHY TEAM SELECT ── */
    .footer-action {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
    }

    .squishy-btn { background: none; border: none; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 10px; outline: none; }
    .helmet-circle {
      width: 100px; height: 100px; border-radius: 50%; overflow: hidden; border: 4px solid #4f2683; background: #000;
      box-shadow: 0 8px 0 #2c1250, 0 12px 20px rgba(0,0,0,0.4); transition: transform 0.1s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.1s ease;
      display: flex; align-items: center; justify-content: center;
    }
    .helmet-circle img { 
      width: 115%; height: 115%; object-fit: cover; 
      clip-path: circle(43%); margin-left: -1%; pointer-events: none; 
    }
    .squishy-btn:active .helmet-circle { transform: translateY(8px) scale(0.95, 0.88); box-shadow: 0 0 0 #2c1250, 0 2px 5px rgba(0,0,0,0.3); }
    .squishy-name { font-size: 0.7rem; font-weight: 900; color: #ffd060; text-transform: uppercase; text-shadow: 0 2px 4px rgba(0,0,0,1); letter-spacing: 0.05em; margin-top: 8px; }

  </style>
</head>
<body>

  <!-- Aerial Stadium -->
  <div class="stadium-aerial">
    <div class="field-markings"></div>
    <div class="video-core">
      <video id="stadium-video" playsinline muted loop>
        <source src="./Jets_Running_10.mp4" type="video/mp4">
      </video>
      <span id="core-text" style="color:#222; font-weight:900; font-size:2rem; letter-spacing:0.2em;">STADIUM CORE</span>
    </div>
  </div>

  <!-- Squishy Button Footer -->
  <div class="footer-action">
    <button class="squishy-btn" onclick="playStadiumVideo()">
      <div class="helmet-circle"><img src="./helmet_vikings.png" alt="Vikings"></div>
      <div class="squishy-name">Purple Peeps</div>
    </button>
  </div>

  <script>
    function playStadiumVideo() {
      var video = document.getElementById('stadium-video');
      var text = document.getElementById('core-text');
      
      if (video.style.display === 'block') {
        video.pause();
        video.style.display = 'none';
        text.style.display = 'block';
      } else {
        text.style.display = 'none';
        video.style.display = 'block';
        video.load();
        video.play();
      }
    }
  </script>

</body>
</html>
