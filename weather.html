<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather — Honest Tom's Dashboard</title>
  <script>
    var VER = 'v=20260325h';
    if (location.search.indexOf(VER) === -1) {
      location.replace(location.pathname + '?' + VER);
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background:
        linear-gradient(160deg, rgba(46,74,26,0.88) 0%, rgba(18,26,9,0.94) 50%, rgba(30,14,7,0.97) 100%),
        url('./angry_lincoln.png') center 20% / cover no-repeat fixed;
      color: #e2eed8;
      font-family: 'Inter', system-ui, sans-serif;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(rgba(255,255,255,0.06) 1px, transparent 1px);
      background-size: 28px 28px;
      pointer-events: none;
      z-index: 0;
    }

    .page {
      position: relative;
      z-index: 1;
      max-width: 860px;
      margin: 0 auto;
      padding: 48px 24px 72px;
    }

    /* ── NAV BAR ── */
    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 40px;
      gap: 16px;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 8px 16px;
      background: transparent;
      border: 1px solid rgba(74,222,128,0.3);
      border-radius: 10px;
      color: #4ade80;
      font-size: 0.78rem;
      font-weight: 600;
      text-decoration: none;
      letter-spacing: 0.04em;
      transition: background 0.15s, border-color 0.15s;
      white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
    }
    .back-btn:hover { background: rgba(34,197,94,0.1); border-color: #4ade80; }

    .nav-title {
      font-size: 1.1rem;
      font-weight: 700;
      color: #f0fae8;
      letter-spacing: -0.02em;
    }

    /* Unit toggle */
    .unit-toggle {
      display: flex;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      overflow: hidden;
    }
    .unit-btn {
      padding: 7px 13px;
      font-size: 0.76rem;
      font-weight: 700;
      cursor: pointer;
      background: none;
      border: none;
      color: #a8bc98;
      font-family: inherit;
      transition: background 0.15s, color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .unit-btn.active { background: rgba(34,197,94,0.18); color: #4ade80; }

    /* ── SEARCH BAR ── */
    .search-wrap {
      position: relative;
      margin-bottom: 28px;
    }

    .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: #a8bc98;
      font-size: 1rem;
      pointer-events: none;
    }

    .search-input {
      width: 100%;
      padding: 14px 14px 14px 42px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px;
      font-size: 0.95rem;
      color: #e2eed8;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s, background 0.15s;
      -webkit-appearance: none;
    }
    .search-input::placeholder { color: #6a8a52; }
    .search-input:focus {
      border-color: rgba(74,222,128,0.4);
      background: rgba(255,255,255,0.07);
    }

    /* Autocomplete dropdown */
    .search-results {
      position: absolute;
      top: calc(100% + 6px);
      left: 0; right: 0;
      background: #141c0b;
      border: 1px solid rgba(74,222,128,0.2);
      border-radius: 12px;
      overflow: hidden;
      z-index: 100;
      display: none;
      box-shadow: 0 12px 40px rgba(0,0,0,0.5);
    }
    .search-results.open { display: block; }

    .result-item {
      padding: 12px 16px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 2px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      transition: background 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .result-item:last-child { border-bottom: none; }
    .result-item:hover, .result-item:focus { background: rgba(34,197,94,0.08); outline: none; }

    .result-city { font-size: 0.92rem; font-weight: 600; color: #f0fae8; }
    .result-sub  { font-size: 0.72rem; color: #a8bc98; }

    /* ── EMPTY STATE ── */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #6a8a52;
    }
    .empty-icon { font-size: 3.5rem; margin-bottom: 16px; }
    .empty-text { font-size: 1rem; font-weight: 500; color: #a8bc98; }
    .empty-sub  { font-size: 0.82rem; margin-top: 6px; color: #6a8a52; }

    /* ── CURRENT WEATHER CARD ── */
    .current-card {
      background: rgba(34,197,94,0.07);
      border: 1px solid rgba(34,197,94,0.2);
      border-radius: 22px;
      padding: 32px;
      margin-bottom: 16px;
      position: relative;
      overflow: hidden;
    }

    .current-card::before {
      content: '';
      position: absolute;
      top: -60px; right: -60px;
      width: 240px; height: 240px;
      background: radial-gradient(circle, rgba(74,222,128,0.1) 0%, transparent 70%);
      pointer-events: none;
    }

    .current-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 20px;
      gap: 16px;
    }

    .current-location {
      font-size: 1.4rem;
      font-weight: 700;
      color: #f0fae8;
      letter-spacing: -0.02em;
    }
    .current-country {
      font-size: 0.78rem;
      color: #a8bc98;
      font-weight: 500;
      margin-top: 3px;
    }
    .current-updated {
      font-size: 0.68rem;
      color: #6a8a52;
      text-align: right;
      white-space: nowrap;
    }

    .current-main {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 28px;
    }

    .current-icon { font-size: 4.5rem; line-height: 1; }

    .current-temp {
      font-size: 5rem;
      font-weight: 800;
      color: #f0fae8;
      letter-spacing: -0.04em;
      line-height: 1;
    }

    .current-unit-label {
      font-size: 2rem;
      font-weight: 300;
      color: #a8bc98;
      vertical-align: super;
    }

    .current-desc {
      font-size: 1rem;
      color: #6a8a58;
      font-weight: 500;
      margin-top: 6px;
    }

    /* Details row */
    .details-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }

    .detail-item {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 12px;
      padding: 12px 14px;
      text-align: center;
    }

    .detail-icon  { font-size: 1.3rem; margin-bottom: 5px; }
    .detail-label { font-size: 0.6rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: #6a8a52; margin-bottom: 4px; }
    .detail-value { font-size: 0.92rem; font-weight: 600; color: #c8e0b8; }

    /* ── FORECAST ROW ── */
    .forecast-title {
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      color: #6a8a52;
      margin-bottom: 10px;
    }

    .forecast-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
      margin-bottom: 16px;
    }

    .forecast-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 14px;
      padding: 14px 8px;
      text-align: center;
      transition: background 0.15s, border-color 0.15s;
    }
    .forecast-card:first-child {
      background: rgba(34,197,94,0.08);
      border-color: rgba(34,197,94,0.18);
    }

    .fc-day   { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: #a8bc98; margin-bottom: 8px; }
    .fc-icon  { font-size: 1.6rem; margin-bottom: 8px; }
    .fc-high  { font-size: 0.88rem; font-weight: 700; color: #f0fae8; }
    .fc-low   { font-size: 0.75rem; color: #a8bc98; margin-top: 2px; }
    .fc-rain  { font-size: 0.65rem; color: #60a8e0; margin-top: 5px; font-weight: 600; }

    /* ── LOADING / ERROR ── */
    .status-msg {
      text-align: center;
      padding: 40px 20px;
      color: #a8bc98;
      font-size: 0.9rem;
    }

    .spinner {
      width: 24px; height: 24px;
      border: 2px solid rgba(74,222,128,0.2);
      border-top-color: #4ade80;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── FOOTER ── */
    .page-footer {
      margin-top: 32px;
      font-size: 0.65rem;
      color: #2e3e1e;
      text-align: center;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 600px) {
      .page { padding: 32px 16px 56px; }
      .details-grid  { grid-template-columns: repeat(2, 1fr); }
      .forecast-grid { grid-template-columns: repeat(4, 1fr); }
      .forecast-grid .forecast-card:nth-child(n+5) { display: none; }
      .current-temp  { font-size: 3.8rem; }
      .current-icon  { font-size: 3.5rem; }
      .nav-title     { display: none; }
    }
  </style>
<!-- Plausible Analytics -->
<script defer data-domain="tomhusom-sudo.github.io" src="https://plausible.io/js/script.js"></script>
</head>
<body>
<div class="page">

  <!-- NAV -->
  <nav class="nav">
    <a class="back-btn" href="./dashboard.html">&#8592; Dashboard</a>
    <div class="nav-title">🌤️ Weather</div>
    <div class="unit-toggle">
      <button class="unit-btn active" id="btn-f" onclick="setUnit('F')">°F</button>
      <button class="unit-btn"        id="btn-c" onclick="setUnit('C')">°C</button>
    </div>
  </nav>

  <!-- SEARCH -->
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input
      class="search-input"
      id="search-input"
      type="text"
      placeholder="Search city or zip code…"
      autocomplete="off"
      autocorrect="off"
      spellcheck="false"
    >
    <div class="search-results" id="search-results"></div>
  </div>

  <!-- WEATHER CONTENT -->
  <div id="weather-content"></div>

  <div class="page-footer">Weather data from <a href="https://open-meteo.com" target="_blank" rel="noopener" style="color:#6a8a52">Open-Meteo</a> · Free &amp; open source</div>

</div>
<script>
(function () {

  var GEO_URL     = 'https://geocoding-api.open-meteo.com/v1/search';
  var WEATHER_URL = 'https://api.open-meteo.com/v1/forecast';

  var unit     = localStorage.getItem('wx_unit') || 'F';
  var location = null;
  var searchTimer = null;

  try { location = JSON.parse(localStorage.getItem('wx_location')); } catch(e) {}

  // ── UNIT TOGGLE ──
  window.setUnit = function(u) {
    unit = u;
    localStorage.setItem('wx_unit', u);
    document.getElementById('btn-f').classList.toggle('active', u === 'F');
    document.getElementById('btn-c').classList.toggle('active', u === 'C');
    if (location) loadWeather(location);
  };

  document.getElementById('btn-f').classList.toggle('active', unit === 'F');
  document.getElementById('btn-c').classList.toggle('active', unit === 'C');

  // ── WEATHER CODE HELPERS ──
  var WX_CODES = {
    0:  { label: 'Clear Sky',          icon: '☀️' },
    1:  { label: 'Mainly Clear',       icon: '🌤️' },
    2:  { label: 'Partly Cloudy',      icon: '⛅' },
    3:  { label: 'Overcast',           icon: '☁️' },
    45: { label: 'Foggy',              icon: '🌫️' },
    48: { label: 'Icy Fog',            icon: '🌫️' },
    51: { label: 'Light Drizzle',      icon: '🌦️' },
    53: { label: 'Drizzle',            icon: '🌦️' },
    55: { label: 'Heavy Drizzle',      icon: '🌧️' },
    61: { label: 'Light Rain',         icon: '🌧️' },
    63: { label: 'Rain',               icon: '🌧️' },
    65: { label: 'Heavy Rain',         icon: '🌧️' },
    71: { label: 'Light Snow',         icon: '🌨️' },
    73: { label: 'Snow',               icon: '❄️' },
    75: { label: 'Heavy Snow',         icon: '❄️' },
    77: { label: 'Snow Grains',        icon: '🌨️' },
    80: { label: 'Light Showers',      icon: '🌦️' },
    81: { label: 'Showers',            icon: '🌧️' },
    82: { label: 'Heavy Showers',      icon: '⛈️' },
    85: { label: 'Snow Showers',       icon: '🌨️' },
    86: { label: 'Heavy Snow Showers', icon: '❄️' },
    95: { label: 'Thunderstorm',       icon: '⛈️' },
    96: { label: 'Thunderstorm',       icon: '⛈️' },
    99: { label: 'Severe Thunderstorm',icon: '🌩️' },
  };

  function wxInfo(code) {
    return WX_CODES[code] || { label: 'Unknown', icon: '🌡️' };
  }

  function windDir(deg) {
    var dirs = ['N','NE','E','SE','S','SW','W','NW'];
    return dirs[Math.round(deg / 45) % 8];
  }

  var DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

  // ── GEOCODING SEARCH ──
  var input   = document.getElementById('search-input');
  var results = document.getElementById('search-results');

  input.addEventListener('input', function() {
    clearTimeout(searchTimer);
    var q = input.value.trim();
    if (q.length < 2) { results.classList.remove('open'); return; }
    searchTimer = setTimeout(function() { doSearch(q); }, 300);
  });

  document.addEventListener('click', function(e) {
    if (!e.target.closest('.search-wrap')) results.classList.remove('open');
  });

  function doSearch(q) {
    fetch(GEO_URL + '?name=' + encodeURIComponent(q) + '&count=6&language=en&format=json')
      .then(function(r) { return r.json(); })
      .then(function(data) {
        var items = data.results || [];
        if (!items.length) { results.classList.remove('open'); return; }
        results.innerHTML = items.map(function(item) {
          var sub = [item.admin1, item.country].filter(Boolean).join(', ');
          return '<div class="result-item" tabindex="0" '
            + 'data-lat="' + item.latitude + '" '
            + 'data-lon="' + item.longitude + '" '
            + 'data-name="' + escHtml(item.name) + '" '
            + 'data-country="' + escHtml(sub) + '">'
            + '<span class="result-city">' + escHtml(item.name) + '</span>'
            + '<span class="result-sub">' + escHtml(sub) + '</span>'
            + '</div>';
        }).join('');
        results.classList.add('open');
        results.querySelectorAll('.result-item').forEach(function(el) {
          el.addEventListener('click', function() { selectLocation(el); });
          el.addEventListener('keydown', function(e) { if (e.key === 'Enter') selectLocation(el); });
        });
      })
      .catch(function() {});
  }

  function selectLocation(el) {
    location = {
      lat:     parseFloat(el.dataset.lat),
      lon:     parseFloat(el.dataset.lon),
      name:    el.dataset.name,
      country: el.dataset.country,
    };
    localStorage.setItem('wx_location', JSON.stringify(location));
    input.value = location.name + (location.country ? ', ' + location.country : '');
    results.classList.remove('open');
    loadWeather(location);
  }

  // ── FETCH + RENDER WEATHER ──
  function loadWeather(loc) {
    var content = document.getElementById('weather-content');
    content.innerHTML = '<div class="status-msg"><div class="spinner"></div>Fetching weather…</div>';

    var tempUnit = unit === 'F' ? 'fahrenheit' : 'celsius';
    var params = [
      'latitude='  + loc.lat,
      'longitude=' + loc.lon,
      'current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m,wind_direction_10m,precipitation',
      'daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_probability_max',
      'temperature_unit=' + tempUnit,
      'wind_speed_unit=mph',
      'timezone=auto',
      'forecast_days=7',
    ].join('&');

    fetch(WEATHER_URL + '?' + params)
      .then(function(r) { return r.json(); })
      .then(function(data) { renderWeather(data, loc); })
      .catch(function() {
        content.innerHTML = '<div class="status-msg">⚠️ Could not load weather. Check your connection.</div>';
      });
  }

  function renderWeather(d, loc) {
    var c   = d.current;
    var day = d.daily;
    var u   = unit === 'F' ? '°F' : '°C';
    var wx  = wxInfo(c.weather_code);
    var now = new Date(c.time);

    // Current card
    var detailsHtml = [
      { icon:'🌡️', label:'Feels Like', value: Math.round(c.apparent_temperature) + u },
      { icon:'💧', label:'Humidity',   value: c.relative_humidity_2m + '%' },
      { icon:'💨', label:'Wind',       value: Math.round(c.wind_speed_10m) + ' mph ' + windDir(c.wind_direction_10m) },
      { icon:'🌧️', label:'Precip',     value: (c.precipitation || 0).toFixed(1) + ' in' },
    ].map(function(x) {
      return '<div class="detail-item">'
        + '<div class="detail-icon">' + x.icon + '</div>'
        + '<div class="detail-label">' + x.label + '</div>'
        + '<div class="detail-value">' + x.value + '</div>'
        + '</div>';
    }).join('');

    // 7-day forecast
    var forecastHtml = day.time.map(function(t, i) {
      var date   = new Date(t + 'T12:00:00');
      var dayName = i === 0 ? 'Today' : DAYS[date.getDay()];
      var fwx    = wxInfo(day.weather_code[i]);
      var rain   = day.precipitation_probability_max[i];
      return '<div class="forecast-card">'
        + '<div class="fc-day">'  + dayName + '</div>'
        + '<div class="fc-icon">' + fwx.icon + '</div>'
        + '<div class="fc-high">' + Math.round(day.temperature_2m_max[i]) + u + '</div>'
        + '<div class="fc-low">'  + Math.round(day.temperature_2m_min[i]) + u + '</div>'
        + (rain ? '<div class="fc-rain">💧 ' + rain + '%</div>' : '')
        + '</div>';
    }).join('');

    document.getElementById('weather-content').innerHTML =
      '<div class="current-card">'
        + '<div class="current-top">'
          + '<div>'
            + '<div class="current-location">' + escHtml(loc.name) + '</div>'
            + '<div class="current-country">'  + escHtml(loc.country) + '</div>'
          + '</div>'
          + '<div class="current-updated">Updated ' + now.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'}) + '</div>'
        + '</div>'
        + '<div class="current-main">'
          + '<div class="current-icon">' + wx.icon + '</div>'
          + '<div>'
            + '<div class="current-temp">' + Math.round(c.temperature_2m) + '<span class="current-unit-label">' + u + '</span></div>'
            + '<div class="current-desc">' + wx.label + '</div>'
          + '</div>'
        + '</div>'
        + '<div class="details-grid">' + detailsHtml + '</div>'
      + '</div>'

      + '<div class="forecast-title">7-Day Forecast</div>'
      + '<div class="forecast-grid">' + forecastHtml + '</div>';
  }

  function escHtml(s) {
    return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── INIT ──
  if (location) {
    input.value = location.name + (location.country ? ', ' + location.country : '');
    loadWeather(location);
  } else {
    document.getElementById('weather-content').innerHTML =
      '<div class="empty-state">'
      + '<div class="empty-icon">🌍</div>'
      + '<div class="empty-text">Search for your city above</div>'
      + '<div class="empty-sub">Your location will be saved for next time</div>'
      + '</div>';
  }

})();
</script>
</body>
</html>
