<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Honest Tom's Campfire Songs</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      background: url('https://honesttom.ai/campfire2.png') center/cover no-repeat fixed;
      color: #f5e6d3;
      font-family: 'Georgia', serif;
      min-height: 100vh;
      padding: 20px;
    }

    .container { max-width: 1100px; margin: 0 auto; }

    header {
      text-align: center;
      margin: 20px 0 30px;
      background: rgba(0, 0, 0, 0.5);
      padding: 20px;
      border-radius: 12px;
    }

    .logo-img {
      max-width: 500px;
      width: 100%;
      height: auto;
      margin-bottom: 20px;
      filter: drop-shadow(0 2px 6px rgba(0,0,0,0.6));
    }

    h1 {
      font-size: 2rem;
      font-weight: normal;
      letter-spacing: 0.08em;
      text-shadow: 0 2px 8px rgba(0,0,0,0.9);
      margin: 0;
    }


    .main-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      margin-bottom: 60px;
    }

    .add-form-section {
      margin-top: 40px;
    }

    @media (max-width: 768px) {
      .main-grid {
        grid-template-columns: 1fr;
      }
      .add-form-section {
        display: none;
      }
      .add-form-section.visible {
        display: block;
      }
      .songs-list {
        max-height: 70vh;
        overflow-y: auto;
        position: relative;
      }
      .songs-list::after {
        content: '⬇ Scroll to see more';
        display: block;
        text-align: center;
        color: #d4a660;
        font-size: 0.85rem;
        margin-top: 20px;
        padding: 10px;
      }
    }

    .add-song-link {
      color: #d4a660;
      cursor: pointer;
      text-decoration: underline;
      font-weight: 600;
      margin-left: 10px;
    }
    .add-song-link:hover {
      color: #e06b38;
    }

    .section {
      background: rgba(26, 42, 58, 0.7);
      border: 1px solid rgba(212, 165, 116, 0.4);
      border-radius: 12px;
      padding: 30px;
      backdrop-filter: blur(12px);
    }

    .section h2 {
      font-size: 1.8rem;
      margin-bottom: 20px;
      color: #d4a660;
      border-bottom: 2px solid rgba(212, 165, 116, 0.5);
      padding-bottom: 12px;
    }

    .form-group { margin-bottom: 16px; }

    label {
      display: block;
      font-size: 0.95rem;
      margin-bottom: 6px;
      color: #d4a660;
      font-weight: bold;
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      border: 1px solid rgba(212, 165, 116, 0.4);
      background: rgba(15, 28, 45, 0.6);
      color: #f5e6d3;
      border-radius: 6px;
      font-family: inherit;
      font-size: 0.95rem;
    }

    input:focus, textarea:focus {
      outline: none;
      border-color: #d4a660;
      box-shadow: 0 0 12px rgba(212, 165, 116, 0.4);
    }

    textarea { resize: vertical; min-height: 70px; }

    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 4px;
      font-size: 0.95rem;
      cursor: pointer;
      font-weight: bold;
      letter-spacing: 0.05em;
      transition: all 0.2s;
    }

    .btn-primary { background: #e06b38; color: #fff; }
    .btn-primary:hover { background: #ff7f50; transform: translateY(-2px); }

    .btn-secondary { background: rgba(212, 165, 116, 0.2); color: #d4a660; border: 1px solid #d4a660; }
    .btn-secondary:hover { background: rgba(212, 165, 116, 0.4); }

    .btn-danger { background: #8b4513; color: #fff; }
    .btn-danger:hover { background: #a0522d; }

    .btn-group { display: flex; gap: 8px; margin-top: 16px; }
    .btn-group .btn { flex: 1; }

    .songs-list {
      display: grid;
      gap: 16px;
      max-height: 600px;
      overflow-y: auto;
      padding-right: 8px;
    }

    .song-card {
      background: rgba(26, 42, 58, 0.5);
      border: 1px solid rgba(212, 165, 116, 0.3);
      border-radius: 8px;
      padding: 14px;
      display: flex;
      gap: 14px;
      align-items: flex-start;
    }

    .song-cover {
      flex-shrink: 0;
      width: 64px;
      height: 64px;
      border-radius: 6px;
      overflow: hidden;
      background: rgba(29, 185, 84, 0.15);
      border: 1px solid rgba(29, 185, 84, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .song-cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .song-cover-placeholder {
      color: rgba(29, 185, 84, 0.4);
      font-size: 28px;
      line-height: 1;
      background: linear-gradient(135deg, rgba(29, 185, 84, 0.1), rgba(29, 185, 84, 0.05));
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .song-body { flex: 1; }

    .song-card-title { font-size: 1.1rem; font-weight: bold; color: #d4a660; margin-bottom: 4px; }
    .song-card-artist { font-size: 0.9rem; color: #c9a961; margin-bottom: 8px; }
    .song-card-note { font-size: 0.85rem; color: #999; margin-bottom: 10px; font-style: italic; }

    .song-actions { display: flex; gap: 8px; margin-top: 10px; }
    .song-actions button { flex: 1; padding: 6px 10px; font-size: 0.8rem; }

    .export-section {
      grid-column: 1 / -1;
      background: rgba(26, 42, 58, 0.7);
      border: 1px solid rgba(212, 165, 116, 0.4);
      border-radius: 12px;
      padding: 30px;
      text-align: center;
    }

    .export-section h2 { margin-bottom: 20px; color: #d4a660; }
    .export-buttons { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
    .export-buttons button { padding: 12px 28px; font-size: 1rem; }

    @media (max-width: 900px) {
      .main-grid { grid-template-columns: 1fr; }
      h1 { font-size: 2.4rem; }
    }
  </style>
</head>
<body>

<div class="container">
  <header>
    <h1>Honest Tom's Campfire</h1>
    <video class="logo-img" autoplay muted loop playsinline>
      <source src="https://honesttom.ai/campgreenpig.mp4" type="video/mp4" />
      Your browser does not support the video tag.
    </video>
  </header>

  <div class="main-grid">
    <div class="section">
      <h2><img src="https://honesttom.ai/carton_tom.png" alt="Tom" style="height:80px;vertical-align:middle;margin-right:15px;">Songs <span class="add-song-link" id="toggleAddForm">+ Add</span></h2>
      <div class="songs-list" id="songsList"></div>
    </div>

    <div class="section">
      <h2><img src="https://honesttom.ai/glaser_fishtrip.png" alt="Campfire Journal" style="height:80px;vertical-align:middle;margin-right:15px;">Campfire Journal</h2>

      <div style="margin-bottom: 30px;">
        <h3 style="color: #d4a660; margin-bottom: 15px;">New Entry</h3>

        <div class="form-group">
          <label for="journalPhoto">Photo</label>
          <div id="photoPreview" style="margin-bottom: 10px;"></div>
          <button type="button" class="btn btn-secondary" id="choosePhotoBtn" style="width:100%;margin-bottom:8px;">Tap to choose a photo</button>
          <input type="file" id="journalPhotoInput" accept="image/*" style="display:none;" />
          <button type="button" class="btn btn-danger" id="removePhotoBtn" style="width:100%;display:none;margin-bottom:8px;">Remove Photo</button>
        </div>

        <div class="form-group">
          <label for="journalNotes">Notes</label>
          <textarea id="journalNotes" placeholder="What happened at the campfire..."></textarea>
        </div>

        <div class="form-group">
          <label for="journalLocation">Location (optional)</label>
          <input type="text" id="journalLocation" placeholder="e.g., Backyard Fire Pit, State Park" />
        </div>

        <button type="button" class="btn btn-primary" id="saveJournalBtn" style="width:100%;">Save Entry</button>
      </div>

      <div>
        <h3 style="color: #d4a660; margin-bottom: 15px;">Past Entries</h3>
        <div id="journalEntries" style="max-height: 500px; overflow-y: auto;"></div>
      </div>
    </div>
  </div>

  <div class="export-section">
    <h2>📥 Export Songs</h2>
    <div class="export-buttons">
      <button class="btn btn-primary" id="exportCsv">Download as CSV</button>
      <button class="btn btn-secondary" id="exportJson">Download as JSON</button>
    </div>
  </div>

  <div class="section add-form-section" id="addFormSection">
    <h2>Add/Edit Song</h2>
    <form id="songForm">
      <div class="form-group">
        <label for="songTitle">Song Title</label>
        <input type="text" id="songTitle" placeholder="e.g., Rocky Raccoon" required />
      </div>
      <div class="form-group">
        <label for="artistName">Artist</label>
        <input type="text" id="artistName" placeholder="e.g., The Beatles" required />
      </div>
      <div class="form-group">
        <label for="spotifyLink">Spotify Link</label>
        <input type="url" id="spotifyLink" placeholder="https://open.spotify.com/..." />
      </div>
      <div class="form-group">
        <label for="songNotes">Notes</label>
        <textarea id="songNotes" placeholder="e.g., Acoustic version preferred..."></textarea>
      </div>
      <div class="btn-group">
        <button type="submit" class="btn btn-primary">Save Song</button>
        <button type="reset" class="btn btn-secondary">Clear</button>
      </div>
      <button type="button" class="btn btn-secondary" id="cancelEdit" style="display:none;width:100%;margin-top:8px;">Cancel Edit</button>
    </form>
  </div>
</div>

<script>
let songs = [];
let editingId = null;

// Pre-seed cache with artwork URLs so images load instantly

    'Tequila Sunrise|Eagles': 'https://is1-ssl.mzstatic.com/image/thumb/Music115/v4/f5/ef/50/f5ef504b-c66a-6645-621c-c279468cc28f/075596062725.jpg/500x500bb.jpg',
    'The Wind Cries Mary|Jimi Hendrix': 'https://is1-ssl.mzstatic.com/image/thumb/Music124/v4/00/67/45/006745f5-95d5-5a06-35ed-d515e9cfd7d8/dj.tbwlxwoh.jpg/500x500bb.jpg',

  Object.assign(cache, artwork);
  localStorage.setItem('coverUrlCache', JSON.stringify(cache));
}
seedCoverCache();

function loadSongs() {
  const saved = localStorage.getItem('campfireSongs');
  songs = saved ? JSON.parse(saved) : [];
  renderSongs();
  fetchCovers();
}

function saveSongs() {
  localStorage.setItem('campfireSongs', JSON.stringify(songs));
}

function renderSongs() {
  const list = document.getElementById('songsList');
  list.innerHTML = '';

  if (songs.length === 0) {
    list.innerHTML = '<p style="color:#999;text-align:center;">No songs yet. Add one above!</p>';
    return;
  }

  songs.forEach((song, idx) => {
    const card = document.createElement('div');
    card.className = 'song-card';
    const coverHtml = song.coverUrl
      ? `<img src="${song.coverUrl}" alt="${song.title}" onerror="this.parentNode.innerHTML='<span class=song-cover-placeholder>🎵</span>'">`
      : `<span class="song-cover-placeholder">🎵</span>`;
    const coverEl = `<div class="song-cover" id="cover-${idx}">${coverHtml}</div>`;
    const spotifyLink = song.spotify ? `<a href="${song.spotify}" target="_blank" rel="noopener" style="color:#1db954;text-decoration:none;font-weight:600;">🎵 Open in Spotify</a>` : '';

    card.innerHTML = `
      ${coverEl}
      <div class="song-body">
        <div class="song-card-title">${song.title}</div>
        <div class="song-card-artist">${song.artist}</div>
        ${song.notes ? `<div class="song-card-note">${song.notes}</div>` : ''}
        ${spotifyLink ? `<div style="margin-top:8px;">${spotifyLink}</div>` : ''}
        <div class="song-actions" style="margin-top:10px;">
          <button class="btn btn-secondary" style="flex:1;padding:6px 10px;font-size:0.8rem;" onclick="editSong(${idx})">Edit</button>
          <button class="btn btn-danger" style="flex:1;padding:6px 10px;font-size:0.8rem;" onclick="deleteSong(${idx})">Delete</button>
        </div>
      </div>
    `;
    list.appendChild(card);
  });
}

function fetchCovers() {
  var changed = false;
  var pending = 0;
  var cache = JSON.parse(localStorage.getItem('coverUrlCache') || '{}');

  function saveCoverCache() {
    localStorage.setItem('coverUrlCache', JSON.stringify(cache));
  }

  function done() {
    if (--pending === 0 && changed) {
      saveCoverCache();
      saveSongs();
    }
  }

  function tryFetch(searchTerm, idx, song, cacheKey) {
    if (cache[cacheKey]) {
      song.coverUrl = cache[cacheKey];
      changed = true;
      const el = document.getElementById('cover-' + idx);
      if (el) el.innerHTML = `<img src="${song.coverUrl}" alt="${song.title}" onerror="this.parentNode.innerHTML='<span class=song-cover-placeholder>🎵</span>'">`;
      return Promise.resolve(true);
    }

    const url = 'https://itunes.apple.com/search?term=' + encodeURIComponent(searchTerm) + '&media=music&limit=1';
    return fetch(url, {signal: AbortSignal.timeout(5000)})
      .then(r => r.json())
      .then(data => {
        const result = data && data.results && data.results[0];
        if (result && result.artworkUrl100) {
          const artwork = result.artworkUrl100.replace('100x100bb', '500x500bb');
          cache[cacheKey] = artwork;
          song.coverUrl = artwork;
          changed = true;
          const el = document.getElementById('cover-' + idx);
          if (el) el.innerHTML = `<img src="${artwork}" alt="${song.title}" onerror="this.parentNode.innerHTML='<span class=song-cover-placeholder>🎵</span>'">`;
          return true;
        }
        return false;
      })
      .catch(() => false);
  }

  songs.forEach((song, idx) => {
    if (!song.coverUrl && song.title && song.artist) {
      pending++;
      const cacheKey = song.title + '|' + song.artist;
      tryFetch(song.title + ' ' + song.artist, idx, song, cacheKey)
        .then(found => {
          if (!found) return tryFetch(song.artist, idx, song, cacheKey);
        })
        .catch(() => {})
        .finally(() => done());
    }
  });

  if (pending === 0) done();
}

document.getElementById('songForm').addEventListener('submit', (e) => {
  e.preventDefault();
  const song = {
    title: document.getElementById('songTitle').value,
    artist: document.getElementById('artistName').value,
    spotify: document.getElementById('spotifyLink').value || '',
    notes: document.getElementById('songNotes').value || ''
  };

  if (editingId !== null) {
    songs[editingId] = song;
    editingId = null;
    document.getElementById('cancelEdit').style.display = 'none';
  } else {
    songs.push(song);
  }

  saveSongs();
  renderSongs();
  fetchCovers();
  document.getElementById('songForm').reset();
});

function editSong(idx) {
  const song = songs[idx];
  document.getElementById('songTitle').value = song.title;
  document.getElementById('artistName').value = song.artist;
  document.getElementById('spotifyLink').value = song.spotify;
  document.getElementById('songNotes').value = song.notes;
  editingId = idx;
  document.getElementById('cancelEdit').style.display = 'block';
  document.getElementById('songTitle').focus();
}

function deleteSong(idx) {
  if (confirm(`Delete "${songs[idx].title}"?`)) {
    songs.splice(idx, 1);
    saveSongs();
    renderSongs();
  }
}

document.getElementById('cancelEdit').addEventListener('click', () => {
  document.getElementById('songForm').reset();
  editingId = null;
  document.getElementById('cancelEdit').style.display = 'none';
});

document.getElementById('toggleAddForm').addEventListener('click', () => {
  const formSection = document.getElementById('addFormSection');
  formSection.classList.toggle('visible');
  document.getElementById('songTitle').focus();
});

document.getElementById('exportCsv').addEventListener('click', () => {
  let csv = 'Song,Artist,Spotify,Notes\n';
  songs.forEach(song => {
    csv += `"${song.title}","${song.artist}","${song.spotify}","${song.notes}"\n`;
  });
  downloadFile(csv, 'campfire-songs.csv', 'text/csv');
});

document.getElementById('exportJson').addEventListener('click', () => {
  const json = JSON.stringify(songs, null, 2);
  downloadFile(json, 'campfire-songs.json', 'application/json');
});

function downloadFile(content, filename, type) {
  const blob = new Blob([content], { type });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  a.click();
  URL.revokeObjectURL(url);
}

// ===== JOURNAL FUNCTIONALITY =====
let journalEntries = [];
let selectedPhotoData = null;

function loadJournal() {
  const saved = localStorage.getItem('campfireJournal');
  journalEntries = saved ? JSON.parse(saved) : [];
  renderJournalEntries();
}

function saveJournal() {
  localStorage.setItem('campfireJournal', JSON.stringify(journalEntries));
}

function renderJournalEntries() {
  const container = document.getElementById('journalEntries');

  if (journalEntries.length === 0) {
    container.innerHTML = '<p style="color:#999;text-align:center;">No entries yet. Create your first one!</p>';
    return;
  }

  container.innerHTML = '';
  journalEntries.slice().reverse().forEach((entry, idx) => {
    const realIdx = journalEntries.length - 1 - idx;
    const entryDiv = document.createElement('div');
    entryDiv.style.cssText = 'background:rgba(15,28,45,0.4);border:1px solid rgba(212,165,116,0.3);border-radius:8px;padding:15px;margin-bottom:12px;';

    let photoHtml = '';
    if (entry.photo) {
      photoHtml = `<img src="${entry.photo}" alt="Entry photo" style="width:100%;max-height:200px;object-fit:cover;border-radius:6px;margin-bottom:10px;">`;
    }

    const dateStr = new Date(entry.date).toLocaleDateString('en-US', {
      year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'
    });

    entryDiv.innerHTML = `
      ${photoHtml}
      <div style="font-size:0.85rem;color:#999;margin-bottom:8px;">${dateStr}</div>
      <div style="color:#f5e6d3;margin-bottom:8px;">${entry.notes}</div>
      ${entry.location ? `<div style="color:#d4a660;font-size:0.9rem;margin-bottom:8px;">📍 ${entry.location}</div>` : ''}
      <button class="btn btn-danger" style="width:100%;padding:6px 10px;font-size:0.8rem;" onclick="deleteJournalEntry(${realIdx})">Delete</button>
    `;
    container.appendChild(entryDiv);
  });
}

function deleteJournalEntry(idx) {
  if (confirm('Delete this entry?')) {
    journalEntries.splice(idx, 1);
    saveJournal();
    renderJournalEntries();
  }
}

// Photo handling
document.getElementById('choosePhotoBtn').addEventListener('click', () => {
  document.getElementById('journalPhotoInput').click();
});

document.getElementById('journalPhotoInput').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (file) {
    const reader = new FileReader();
    reader.onload = (event) => {
      selectedPhotoData = event.target.result;
      const preview = document.getElementById('photoPreview');
      preview.innerHTML = `<img src="${selectedPhotoData}" alt="Selected" style="width:100%;max-height:150px;object-fit:cover;border-radius:6px;margin-bottom:10px;">`;
      document.getElementById('removePhotoBtn').style.display = 'block';
    };
    reader.readAsDataURL(file);
  }
});

document.getElementById('removePhotoBtn').addEventListener('click', () => {
  selectedPhotoData = null;
  document.getElementById('journalPhotoInput').value = '';
  document.getElementById('photoPreview').innerHTML = '';
  document.getElementById('removePhotoBtn').style.display = 'none';
});

// Save journal entry
document.getElementById('saveJournalBtn').addEventListener('click', () => {
  const notes = document.getElementById('journalNotes').value.trim();
  const location = document.getElementById('journalLocation').value.trim();

  if (!notes) {
    alert('Please add some notes to your entry!');
    return;
  }

  const entry = {
    date: new Date().toISOString(),
    photo: selectedPhotoData || null,
    notes: notes,
    location: location
  };

  journalEntries.push(entry);
  saveJournal();
  renderJournalEntries();

  // Clear form
  document.getElementById('journalNotes').value = '';
  document.getElementById('journalLocation').value = '';
  selectedPhotoData = null;
  document.getElementById('photoPreview').innerHTML = '';
  document.getElementById('removePhotoBtn').style.display = 'none';
  document.getElementById('journalPhotoInput').value = '';
});

loadJournal();
